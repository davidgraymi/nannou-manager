name: release-artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build artifacts for (e.g. v0.2.0)"
        required: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            runner: macos-14
            target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin --bundles app
            dmg_arch: aarch64
          - name: macos-x86_64
            runner: macos-13
            target: x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin --bundles app
            dmg_arch: x64
          - name: linux-x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            tauri_args: --bundles deb,rpm,appimage
          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            tauri_args: --bundles msi

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$(echo "${{ github.event.inputs.tag || github.ref_name }}" | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux build deps (Tauri + bundles)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            rpm

      - name: Setup Node (for Tauri UI assets)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: crates/desktop/ui/package-lock.json

      - name: Build UI bundle
        shell: bash
        working-directory: crates/desktop/ui
        run: |
          npm ci
          npm run build

      # ---------- CLI ----------
      - name: Build CLI
        shell: bash
        run: cargo build --release --locked -p nannou-manager-cli --target ${{ matrix.target }}

      - name: Package CLI archive
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.tag.outputs.version }}"
          name="nou-${version}-${{ matrix.target }}"
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            bin="target/${{ matrix.target }}/release/nou.exe"
            archive="dist/${name}.zip"
            7z a "$archive" "$bin" README.md
          else
            bin="target/${{ matrix.target }}/release/nou"
            archive="dist/${name}.tar.gz"
            tmpdir=$(mktemp -d)
            cp "$bin" "$tmpdir/"
            cp README.md "$tmpdir/"
            tar -C "$tmpdir" -czf "$archive" nou README.md
          fi

      # ---------- Desktop (Tauri) ----------
      # macOS: builds .app only (no DMG). We inject the CLI and build the DMG ourselves below.
      # Linux/Windows: builds the configured installer formats directly.
      - name: Build desktop bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/desktop
          args: ${{ matrix.tauri_args }}
          includeRelease: false
          includeUpdaterJson: false

      # ---------- macOS: inject CLI into .app and build DMG ----------
      - name: Inject CLI into .app and build DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.tag.outputs.version }}"
          target="${{ matrix.target }}"
          dmg_arch="${{ matrix.dmg_arch }}"
          app="crates/desktop/target/${target}/release/bundle/macos/Nannou Manager.app"
          if [ ! -d "$app" ]; then
            echo "Expected .app at: $app"
            ls -R "crates/desktop/target/${target}/release/bundle" || true
            exit 1
          fi

          cp "target/${target}/release/nou" "$app/Contents/MacOS/nou"
          chmod +x "$app/Contents/MacOS/nou"

          # Re-sign ad-hoc so Gatekeeper doesn't reject the modified bundle. Real signing
          # (APPLE_CERTIFICATE / notarization) would replace this; ad-hoc is acceptable
          # for local + brew-cask installs since the cask is from a trusted tap.
          codesign --force --deep --sign - "$app"

          mkdir -p dist
          dmg="dist/Nannou-Manager_${version}_${dmg_arch}.dmg"
          # Plain compressed DMG. Tauri's bundler produces a nicer layout (background,
          # icon positions, /Applications shortcut); if you want that, switch to
          # `create-dmg` (brew install create-dmg) with a layout spec.
          staging=$(mktemp -d)
          cp -R "$app" "$staging/"
          ln -s /Applications "$staging/Applications"
          hdiutil create \
            -volname "Nannou Manager" \
            -srcfolder "$staging" \
            -ov \
            -format UDZO \
            "$dmg"

      # ---------- Linux/Windows: collect installer bundles ----------
      - name: Collect Linux/Windows installer bundles
        if: runner.os != 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          base="crates/desktop/target/${{ matrix.target }}/release/bundle"
          find "$base" -maxdepth 3 -type f \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.msi' \) \
            -exec cp {} dist/ \;

      # ---------- Upload everything to the release ----------
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            dist/*

  publish-tap:
    name: Publish Homebrew tap
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Compute version
        id: ver
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Fetch release asset SHA256 sums
        id: sums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p hashes
          fetch() {
            local name="$1"
            local url="https://github.com/${REPO}/releases/download/${TAG}/${name}"
            curl -fsSL -o "hashes/${name}" "$url"
            sha256sum "hashes/${name}" | awk '{print $1}'
          }
          {
            echo "mac_arm64_sha=$(fetch "nou-${VERSION}-aarch64-apple-darwin.tar.gz")"
            echo "mac_x86_64_sha=$(fetch "nou-${VERSION}-x86_64-apple-darwin.tar.gz")"
            echo "linux_x86_64_sha=$(fetch "nou-${VERSION}-x86_64-unknown-linux-gnu.tar.gz")"
            echo "dmg_arm64_sha=$(fetch "Nannou-Manager_${VERSION}_aarch64.dmg")"
            echo "dmg_x86_64_sha=$(fetch "Nannou-Manager_${VERSION}_x64.dmg")"
          } >> "$GITHUB_OUTPUT"

      - name: Check out tap
        uses: actions/checkout@v4
        with:
          repository: davidgraymi/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Write Formula and Cask
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          REPO: ${{ github.repository }}
          MAC_ARM_SHA: ${{ steps.sums.outputs.mac_arm64_sha }}
          MAC_X86_SHA: ${{ steps.sums.outputs.mac_x86_64_sha }}
          LINUX_X86_SHA: ${{ steps.sums.outputs.linux_x86_64_sha }}
          DMG_ARM_SHA: ${{ steps.sums.outputs.dmg_arm64_sha }}
          DMG_X86_SHA: ${{ steps.sums.outputs.dmg_x86_64_sha }}
        run: |
          set -euo pipefail
          mkdir -p tap/Formula tap/Casks
          base="https://github.com/${REPO}/releases/download/v${VERSION}"

          cat > tap/Formula/nou.rb <<EOF
          class Nou < Formula
            desc "CLI for managing nannou creative coding projects"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${base}/nou-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${MAC_ARM_SHA}"
              end
              on_intel do
                url "${base}/nou-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${MAC_X86_SHA}"
              end
            end

            on_linux do
              on_intel do
                url "${base}/nou-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_X86_SHA}"
              end
            end

            def install
              bin.install "nou"
            end

            test do
              assert_match "nou", shell_output("#{bin}/nou --version")
            end
          end
          EOF

          cat > tap/Casks/nannou-manager.rb <<EOF
          cask "nannou-manager" do
            version "${VERSION}"

            on_arm do
              url "${base}/Nannou-Manager_#{version}_aarch64.dmg"
              sha256 "${DMG_ARM_SHA}"
            end
            on_intel do
              url "${base}/Nannou-Manager_#{version}_x64.dmg"
              sha256 "${DMG_X86_SHA}"
            end

            name "Nannou Manager"
            desc "Desktop app for managing nannou creative coding projects (bundles the \`nou\` CLI)"
            homepage "https://github.com/${REPO}"

            # Cask conflicts with the standalone formula: both ship the \`nou\` binary.
            conflicts_with formula: "nou"

            app "Nannou Manager.app"

            # Symlink the bundled CLI into the user's PATH, like VS Code's \`code\` shim.
            binary "#{appdir}/Nannou Manager.app/Contents/MacOS/nou", target: "nou"

            zap trash: [
              "~/Library/Application Support/com.nannou-manager",
              "~/Library/Preferences/com.nannou-manager.plist",
            ]
          end
          EOF

      - name: Commit and push
        working-directory: tap
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/nou.rb Casks/nannou-manager.rb
          if git diff --cached --quiet; then
            echo "No tap changes."
            exit 0
          fi
          git commit -m "nannou-manager ${VERSION}"
          git push
