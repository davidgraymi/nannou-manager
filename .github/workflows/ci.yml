name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same ref when a new commit lands, so
# stale builds don't hold runners or sit ahead of fresh ones in the queue.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  # Incremental compilation buys nothing on fresh CI checkouts and only bloats
  # the cache; disabling it improves rust-cache hit rates.
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short

jobs:
  # All jobs run in parallel: total wall-clock is the slowest single job, not
  # the sum. (Lint failures won't pre-empt the test job, but that's a cheap
  # price for the parallelism.)
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        # Pinned: a new `stable` release would otherwise invalidate every cache.
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt
      - name: Check Formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Lint Check (Clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy

      - name: Install system dependencies (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev
          version: 1.0

      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy
          # Only the main branch writes the cache; PRs restore main's warm
          # cache (Tauri/webkit prebuilt) instead of each saving their own.
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Run Audit
        run: cargo audit

  test:
    name: Test + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          # Separate from the lint cache: coverage builds are instrumented and
          # would otherwise thrash clippy's artifacts.
          key: test-coverage
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Configure git identity (needed by core git tests)
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"

      - name: Run tests under coverage (core + cli)
        run: |
          cargo llvm-cov \
            --locked \
            --package nannou-manager-core \
            --package nannou-manager-cli \
            --no-report

      - name: Generate lcov report
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info

      - name: Generate summary and enforce threshold
        run: |
          cargo llvm-cov report --summary-only --fail-under-lines 70 \
            | tee coverage-summary.txt

      - name: Write coverage summary to job summary
        if: always()
        run: |
          {
            echo "## Coverage summary"
            echo ""
            echo '```'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: error
